name: Set Captaincy

on:
  workflow_dispatch:
    inputs:
      captain:
        description: "Captain (last name substring). Empty = use CURRENT_CAPTAIN repo variable."
        required: false
        type: string
      vice_captain:
        description: "Vice-captain (last name substring). Empty = use CURRENT_VICE_CAPTAIN repo variable."
        required: false
        type: string
  schedule:
    # 7:00 PM IST = 13:30 UTC. Fires daily; harmless on non-match days (script exits early).
    - cron: "30 13 * * *"

jobs:
  set-captaincy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run set_captaincy.py
        env:
          IPL_EMAIL: ${{ secrets.IPL_EMAIL }}
          IMAP_EMAIL: ${{ secrets.IMAP_EMAIL }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CAPTAIN: ${{ inputs.captain || vars.CURRENT_CAPTAIN }}
          VICE_CAPTAIN: ${{ inputs.vice_captain || vars.CURRENT_VICE_CAPTAIN }}
        run: uv run python scripts/set_captaincy.py
